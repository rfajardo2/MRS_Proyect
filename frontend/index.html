<!doctype html>
<html lang="es" ng-app="mrsDrunkApp">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MRS Drunk</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="app/styles/main.css">
</head>
<body ng-controller="LayoutController as layout">
  <div class="loading-screen" ng-if="globalLoading">
    <div class="loading-card">
      <img src="app/assets/img/mrs-drunk-logo.svg" alt="MRS Drunk">
      <div class="loading-spinner"></div>
      <strong>Cargando</strong>
      <span>Preparando la informacion...</span>
    </div>
  </div>

  <div ng-if="!layout.isAuthenticated()" ng-view></div>

  <div class="app-shell" ng-if="layout.isAuthenticated()" ng-class="{'sidebar-open': layout.sidebarOpen}">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="app/assets/img/mrs-drunk-logo.svg" alt="MRS Drunk">
        <div>
          <strong>MRS Drunk</strong>
          <span>{{layout.user.empresa}}</span>
        </div>
      </div>

      <div class="profile">
        <div class="avatar">{{layout.user.nombreCompleto.charAt(0)}}</div>
        <div>
          <strong>{{layout.user.nombreCompleto}}</strong>
          <span>{{layout.user.nombreRol}}</span>
        </div>
      </div>

      <div class="menu-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" placeholder="Buscar opcion" ng-model="layout.search">
      </div>

      <nav class="menu">
        <section ng-repeat="modulo in layout.menu" class="menu-module">
          <button type="button"
                  class="menu-module-toggle"
                  ng-click="layout.toggleModule(modulo)"
                  ng-class="{active: layout.moduleHasActiveRoute(modulo)}">
            <span><i class="fa-solid {{modulo.icono}}"></i>{{modulo.nombre}}</span>
            <i class="fa-solid" ng-class="layout.isModuleOpen(modulo) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </button>
          <div class="menu-module-items" ng-if="layout.isModuleOpen(modulo)">
          <button type="button"
                  ng-repeat="ventana in modulo.ventanas | filter:layout.search"
                  ng-class="{active: layout.isActive(ventana.ruta)}"
                  ng-click="layout.go(ventana.ruta)">
            <i class="fa-solid {{ventana.icono}}"></i>
            <span>{{ventana.nombre}}</span>
          </button>
          </div>
        </section>
      </nav>

      <button class="btn ghost logout" type="button" ng-click="layout.logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Cerrar sesion</span>
      </button>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="icon-btn mobile-only" type="button" ng-click="layout.sidebarOpen = !layout.sidebarOpen" title="Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div>
          <span class="eyebrow">Administracion comercial</span>
          <h1>MRS Drunk</h1>
        </div>
        <div class="topbar-user">
          <span>{{layout.user.nombreUsuario}}</span>
          <i class="fa-solid fa-circle-user"></i>
        </div>
      </header>
      <div class="view-host" ng-view></div>
    </main>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="app/app.js"></script>
  <script src="app/routes/routes.js"></script>
  <script src="app/services/config.js"></script>
  <script src="app/services/loadingService.js"></script>
  <script src="app/services/authService.js"></script>
  <script src="app/services/httpInterceptor.js"></script>
  <script src="app/services/menuService.js"></script>
  <script src="app/services/usuariosService.js"></script>
  <script src="app/services/rolesService.js"></script>
  <script src="app/services/permisosService.js"></script>
  <script src="app/services/empresasService.js"></script>
  <script src="app/services/nominaService.js"></script>
  <script src="app/services/sesionesService.js"></script>
  <script src="app/services/configuracionService.js"></script>
  <script src="app/services/productosService.js"></script>
  <script src="app/services/inventarioService.js"></script>
  <script src="app/services/operacionService.js"></script>
  <script src="app/controllers/loginController.js"></script>
  <script src="app/controllers/layoutController.js"></script>
  <script src="app/controllers/homeController.js"></script>
  <script src="app/controllers/usuariosController.js"></script>
  <script src="app/controllers/usuarioDetalleController.js"></script>
  <script src="app/controllers/rolesController.js"></script>
  <script src="app/controllers/permisosController.js"></script>
  <script src="app/controllers/empresasController.js"></script>
  <script src="app/controllers/nominaController.js"></script>
  <script src="app/controllers/sesionesController.js"></script>
  <script src="app/controllers/configuracionVentasController.js"></script>
  <script src="app/controllers/productosController.js"></script>
  <script src="app/controllers/inventarioController.js"></script>
  <script src="app/controllers/operacionCuentasController.js"></script>
  <script src="app/controllers/balanceDiaController.js"></script>
  <script src="app/controllers/cajaController.js"></script>
  <script src="app/controllers/adminCuentasController.js"></script>
  <script src="app/controllers/adminUsuariosCuentasController.js"></script>
</body>
</html>
