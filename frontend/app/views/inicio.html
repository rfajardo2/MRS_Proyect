<main class="public-page">
  <section class="public-hero">
    <div class="public-hero-media">
      <img src="app/assets/img/mrsdrunk_logo.jpg" alt="MRS Drunk">
    </div>

    <div class="public-hero-content">
      <span class="eyebrow">MRS Drunk</span>
      <h1>Menu y administracion del local</h1>
      <p>Consulta la carta disponible o entra al sistema administrativo.</p>
      <div class="public-actions">
        <button class="btn primary" type="button" ng-click="vm.goMenu()">
          <i class="fa-solid fa-martini-glass-citrus"></i>
          <span>Ver menu</span>
        </button>
        <button class="btn ghost" type="button" ng-click="vm.goLogin()">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Iniciar sesion</span>
        </button>
      </div>
    </div>
  </section>
</main>
